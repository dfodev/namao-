{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2><i class="fas fa-heart"></i> Meus Favoritos</h2>

    <div class="row">
        {% for fav in favorites %}
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5>{{ fav.provider.name }}</h5>
                        <p class="text-muted">{{ fav.provider.categoria }}</p>
                        <p>{{ fav.provider.bairro }}</p>
                        <a href="{{ url_for('perfil_publico', user_id=fav.provider_id) }}" class="btn btn-primary btn-sm">
                            Ver perfil
                        </a>
                        <a href="{{ url_for('favoritar', provider_id=fav.provider_id) }}" class="btn btn-danger btn-sm">
                            Remover
                        </a>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
