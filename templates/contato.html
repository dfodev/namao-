{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm" data-aos="fade-up">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div style="width: 70px; height: 70px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                            <i class="fas fa-headset fa-2x" style="color: white;"></i>
                        </div>
                        <h2 style="color: var(--primary-dark);">Central de Atendimento</h2>
                        <p class="text-muted">Estamos prontos para ajudar você!</p>
                    </div>

                    <div class="row mt-4">
                        <div class="col-md-6 mb-4">
                            <div class="text-center p-4 border rounded-3 h-100">
                                <i class="fas fa-envelope fa-3x mb-3" style="color: var(--primary);"></i>
                                <h5>E-mail</h5>
                                <p class="text-muted mb-2">suport.namao@gmail.com</p>
                                <a href="mailto:suport.namao@gmail.com" class="btn btn-primary btn-sm">
                                    <i class="fas fa-paper-plane me-1"></i> Enviar e-mail
                                </a>
                            </div>
                        </div>

                        <div class="col-md-6 mb-4">
                            <div class="text-center p-4 border rounded-3 h-100">
                                <i class="fab fa-whatsapp fa-3x mb-3" style="color: #25d366;"></i>
                                <h5>WhatsApp</h5>
                                <p class="text-muted mb-2">Atendimento rápido</p>
                                <a href="https://wa.me/5511999999999" target="_blank" class="btn btn-success btn-sm">
                                    <i class="fab fa-whatsapp me-1"></i> Chamar no WhatsApp
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-info mt-3">
                        <i class="fas fa-clock me-2"></i>
                        <strong>Horário de atendimento:</strong> Segunda a Sexta, das 8h às 18h
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
