{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-lg" data-aos="fade-up">
                <div class="card-body p-5">
                    <div class="text-center mb-5">
                        <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle p-3 mb-3"
                             style="width: 80px; height: 80px;">
                            <i class="fas fa-headset fa-2x text-primary"></i>
                        </div>
                        <h2 class="fw-bold text-dark">Central de Atendimento</h2>
                        <p class="text-muted">Estamos prontos para ajudar você!</p>
                    </div>

                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="card border-0 shadow-sm h-100 shadow-hover">
                                <div class="card-body text-center p-4">
                                    <div class="stat-icon bg-primary mx-auto mb-3" style="width: 60px; height: 60px;">
                                        <i class="fas fa-envelope fa-lg"></i>
                                    </div>
                                    <h5 class="fw-bold text-dark">E-mail</h5>
                                    <p class="text-muted mb-3">suport.namao@gmail.com</p>
                                    <a href="mailto:suport.namao@gmail.com" class="btn btn-primary rounded-pill">
                                        <i class="fas fa-paper-plane me-2"></i>Enviar e-mail
                                    </a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card border-0 shadow-sm h-100 shadow-hover">
                                <div class="card-body text-center p-4">
                                    <div class="stat-icon bg-success mx-auto mb-3" style="width: 60px; height: 60px;">
                                        <i class="fab fa-whatsapp fa-lg"></i>
                                    </div>
                                    <h5 class="fw-bold text-dark">WhatsApp</h5>
                                    <p class="text-muted mb-3">Atendimento rápido</p>
                                    <a href="https://wa.me/5511999999999" target="_blank"
                                       class="btn btn-success rounded-pill">
                                        <i class="fab fa-whatsapp me-2"></i>Chamar no WhatsApp
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="alert alert-info mt-4 rounded-pill text-center">
                        <i class="fas fa-clock me-2"></i>
                        <strong>Horário de atendimento:</strong> Segunda a Sexta, das 8h às 18h
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
