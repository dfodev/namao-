{% extends "base.html" %}

{% block content %}
<div class="container py-5" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
    <div class="card border-0 shadow-lg" style="max-width: 480px; width: 100%;" data-aos="fade-up">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 rounded-circle p-3 mb-3" style="width: 70px; height: 70px;">
                    <i class="fas fa-key fa-2x text-success"></i>
                </div>
                <h3 class="fw-bold text-dark">Redefinir Senha</h3>
                <p class="text-muted small">Crie uma nova senha para sua conta.</p>
            </div>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">Nova senha</label>
                    <input type="password" name="password" class="form-control" required minlength="6" placeholder="••••••">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">Confirmar senha</label>
                    <input type="password" name="confirm_password" class="form-control" required placeholder="••••••">
                </div>
                <button type="submit" class="btn btn-success w-100 rounded-pill">
                    <i class="fas fa-check-circle me-2"></i>Redefinir senha
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
