{% extends "base.html" %}

{% block content %}
<div class="container py-5" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
    <div class="card border-0 shadow-lg" style="max-width: 480px; width: 100%;" data-aos="fade-up">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="d-inline-flex align-items-center justify-content-center bg-warning bg-opacity-10 rounded-circle p-3 mb-3"
                     style="width: 70px; height: 70px;">
                    <i class="fas fa-lock fa-2x text-warning"></i>
                </div>
                <h3 class="fw-bold text-dark">Recuperar Senha</h3>
                <p class="text-muted small">Digite seu email para receber o link de redefinição.</p>
            </div>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">Email cadastrado</label>
                    <input type="email" name="email" class="form-control" required placeholder="seu@email.com">
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill">
                    <i class="fas fa-paper-plane me-2"></i>Enviar link de recuperação
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('login') }}" class="text-muted small"><i class="fas fa-arrow-left me-1"></i>Voltar
                    para login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
